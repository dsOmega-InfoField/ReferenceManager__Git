[project]
name = "ReferenceManager__Git"
version = "0.1.0"
description = "Using git for archiving repositories and maintaining them in a context of reference management"
authors = ["DeadlySquad13 <46250621+DeadlySquad13@users.noreply.github.com>"]
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
#   `break-system-packages` option is set to mute ArchLinux notifications that we
# are installing package globally (in reality we aren't, it's just pixi venvs
# are recognized as global).
postinstall = "pip install --no-build-isolation --no-deps --disable-pip-version-check --break-system-packages -e ."
build = "echo test"
create-solution = "python -m create_solution.main"

[dependencies]
python = ">=3.14"
tqdm = ">=4.67.3,<5"

[feature.test]
tasks = { test = "pytest" }
pypi-dependencies = { ReferenceManager__Git = { path = "./", editable = true }, pytest = "==6.2.5", pytest-cov = "==2.12.1" }

[feature.lint.tasks]
lint-check = "flake8 src"

format = "black src"
format-check = "black --check --diff src"

types-check = "mypy src"

order-imports = "isort src"
order-imports-check = "isort --check --diff src"

[feature.lint.pypi-dependencies]
flake8 = "==7.0.0"
tox = "==3.24.3"
mypy = "==1.9.0"
black = "==24.3.0"
isort = "==5.13.2"

[feature.pre-commit]
tasks = { pre-commit-check = "pre-commit run --all-files" }
pypi-dependencies = { ReferenceManager__Git = { path = "./", editable = true }, pre-commit = "==3.7.0" }

[environments]
default = []
dev = ["test", "lint", "pre-commit"]

[pypi-dependencies]
gitpython = ">=3.1.46, <4"
